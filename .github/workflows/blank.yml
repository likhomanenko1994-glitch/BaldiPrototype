name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup Godot
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/3.5.stable/
          ls /usr/local/share/godot/export_templates/ || echo "Templates not found in expected location"
          find / -name "*export_templates*" -type d 2>/dev/null || true
      
      - name: Create Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
      
      - name: Build APK
        run: |
          mkdir -v build
          godot --export "Android" build/BaldiPrototype.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BaldiPrototype-APK
          path: build/BaldiPrototype.apk
